name: Build & Release

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Minecraft 1.20.x target)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build with Gradle
        run: gradle shadowJar --no-daemon

      - name: Generate unique release tag
        id: tag
        run: echo "version=build-$(date +'%Y%m%d-%H%M%S')-run${{ github.run_id }}_attempt${{ github.run_attempt }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: OrthodoxIcons ${{ steps.tag.outputs.version }}
          body: |
            ## OrthodoxIcons ${{ steps.tag.outputs.version }}

            Auto-built from commit ${{ github.sha }}.

            Drop the `.jar` into your server's `plugins/` folder and restart.
          files: build/libs/*.jar
          generate_release_notes: true
