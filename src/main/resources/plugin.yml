name: OrthodoxIcons
version: '${version}'
main: com.orthodoxicons.OrthodoxIconsPlugin
api-version: '1.20'
folia-supported: false
description: Automatically downloads authentic Eastern Orthodox icons and turns them into craftable, placeable decorative items.
author: OrthodoxIcons Team
website: https://github.com/orthodoxicons/OrthodoxIcons

# Optional dependencies. The plugin detects these reflectively and never
# crashes when they are absent.
softdepend:
  - ViaVersion
  - ViaBackwards
  - ViaRewind
  - WorldGuard
  - GriefPrevention
  - Lands
  - Towny

commands:
  icons:
    description: Root command for OrthodoxIcons.
    usage: /icons help
    aliases:
      - orthodoxicons
      - oi

permissions:
  orthodoxicons.use:
    description: Allows browsing and obtaining icons.
    default: true
  orthodoxicons.place:
    description: Allows placing icons in the world.
    default: true
  orthodoxicons.admin:
    description: Grants all administrative OrthodoxIcons permissions.
    default: op
    children:
      orthodoxicons.use: true
      orthodoxicons.place: true
      orthodoxicons.reload: true
      orthodoxicons.update: true
      orthodoxicons.give: true
      orthodoxicons.cache: true
      orthodoxicons.debug: true
  orthodoxicons.reload:
    description: Allows reloading the configuration and recipes.
    default: op
  orthodoxicons.update:
    description: Allows triggering icon updates from providers.
    default: op
  orthodoxicons.give:
    description: Allows giving icons to players.
    default: op
  orthodoxicons.cache:
    description: Allows managing the local cache.
    default: op
  orthodoxicons.debug:
    description: Allows viewing debug information.
    default: op
